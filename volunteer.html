<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Volunteer with Project Reach – Help someone who just needs to be heard." />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css" crossorigin="anonymous" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800&family=Lato:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="icon" href="assets/favicon.png" />
  <link rel="stylesheet" href="assets/styles.css" />
  <title>Volunteer – Project Reach</title>
</head>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-S8M7YHYFMV"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-S8M7YHYFMV');
</script>
<body>
<div id="header"></div>

<main>
  <section class="page-header">
    <h1>Make a Difference</h1>
    <p>Become a volunteer listener and help someone who just needs to be heard.</p>
  </section>

  <section class="section">
    <div class="container" style="max-width:600px;">
      <div class="box">
        <form id="volunteerForm">
          <div class="form-group">
            <label for="name">Full Name <span aria-hidden="true">*</span></label>
            <input type="text" id="name" name="name" required placeholder="Your full name" autocomplete="name" />
          </div>
          <div class="form-group">
            <label for="email">Email Address <span aria-hidden="true">*</span></label>
            <input type="email" id="email" name="email" required placeholder="you@example.com" autocomplete="email" />
          </div>
          <div class="form-group">
            <label for="why">Why do you want to volunteer? <span aria-hidden="true">*</span></label>
            <textarea id="why" name="message" rows="5" required placeholder="Share a bit about your motivation..."></textarea>
          </div>
          <label class="form-consent">
            <input type="checkbox" id="consent" name="consent" required />
            <span>I have read and agree to the <a href="code-of-conduct.html" target="_blank">Code of Conduct</a> <span aria-hidden="true">*</span></span>
          </label>
          <button type="submit" class="btn-primary" style="width:100%;justify-content:center;">Submit Application</button>
          <p id="formStatus" class="form-status" aria-live="polite"></p>
        </form>
      </div>
    </div>
  </section>
</main>

<script>
  function toggleDropdown() {
    document.getElementById("volunteerDropdown").classList.toggle("open");
  }
  document.addEventListener("click", function (e) {
    if (!e.target.closest(".has-dropdown")) {
      document.getElementById("volunteerDropdown")?.classList.remove("open");
    }
  });

  const form = document.getElementById("volunteerForm");
  const status = document.getElementById("formStatus");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    status.textContent = "Submitting...";
    status.className = "form-status";

    const data = new FormData(form);
    const endpoint = "https://formspree.io/f/mnnvplrw";

    try {
      const response = await fetch(endpoint, {
        method: "POST",
        headers: { Accept: "application/json" },
        body: data,
      });
      if (response.ok) {
        status.textContent = "✅ Thank you for signing up! We'll be in touch soon.";
        status.className = "form-status success";
        form.reset();
      } else {
        throw new Error("Submission failed");
      }
    } catch (error) {
      status.textContent = "⚠️ Something went wrong. Please try again later.";
      status.className = "form-status error";
    }
  });
</script>

<div id="footer"></div>
<script src="scripts/dark_mode.js"></script>
<script>
  fetch('assets/partials/header.html')
    .then(r => r.text())
    .then(html => {
      document.getElementById('header').innerHTML = html;
      initDarkModeToggle();
    });
  fetch('assets/partials/footer.html')
    .then(r => r.text())
    .then(html => { document.getElementById('footer').innerHTML = html; });
</script>
</body>
</html>
