<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="description" content="Page not found – Project Reach. The page you're looking for doesn't exist, but we're still here for you." />
<meta name="theme-color" content="#2D4A3E" />
<meta property="og:type" content="website" />
<meta property="og:site_name" content="Project Reach" />
<meta property="og:title" content="Page Not Found | Project Reach" />
<meta property="og:description" content="The page you're looking for doesn't exist. Let us help you find what you need." />
<meta property="og:url" content="https://thereachcommunity.com/" />
<meta property="og:image" content="https://thereachcommunity.com/assets/og-image.png" />
<meta name="twitter:card" content="summary_large_image" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css" crossorigin="anonymous" />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,800;1,400&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
<link rel="icon" href="assets/favicon.png" />
<link rel="stylesheet" href="assets/styles.css" />
<script>(function(){var t=localStorage.getItem('theme');if(t==='dark')document.documentElement.classList.add('dark');}());</script>
<title>Page Not Found – Project Reach</title>
</head>
<body>
<div id="header"></div>

<main id="main-content">
  <section class="section" style="min-height:60vh;display:flex;align-items:center;">
    <div class="container" style="max-width:560px;text-align:center;">
      <h1 style="font-size:clamp(2rem,5vw,3.5rem);margin-bottom:0.5rem;">404</h1>
      <p style="font-size:clamp(1.125rem,2.5vw,1.5rem);margin-bottom:1rem;color:var(--color-text-muted);">Page not found</p>
      <p style="color:var(--color-text-muted);margin-bottom:2rem;">The page you're looking for doesn't exist or has been moved. But we're still here for you.</p>
      <div style="display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;">
        <a href="index.html" class="btn-primary">Back to Home</a>
        <a href="get-support.html" class="btn-secondary">Get Support</a>
      </div>
    </div>
  </section>
</main>

<div id="footer"></div>
<script src="scripts/nav.js"></script>
<script src="scripts/dark_mode.js"></script>
<script src="scripts/animations.js"></script>
<script>
  fetch('assets/partials/header.html')
    .then(r => r.text())
    .then(html => {
      document.getElementById('header').innerHTML = html;
      initDarkModeToggle();
      initNav();
    });
  fetch('assets/partials/footer.html')
    .then(r => r.text())
    .then(html => { document.getElementById('footer').innerHTML = html; });
</script>
</body>
</html>
